  /advancedsearch/api/search:
    post:
      summary: POST /advancedsearch/api/search
      description: 'The /advancedsearch endpoint allows Advanced Search data to be queried and exported in JSON format from
        the Darktrace instance programmatically. Advanced Search queries are Base64 encoded strings, composed of the query
        search terms. There are three extensions available: • /advancedsearch/api/search • /advancedsearch/api/analyze • /advancedsearch/api/graph
        The search extension provides the standard Advanced Search query functionality - see graph or analyze for more details
        on other extensions. To familiarize yourself with what a query might look like, make a basic query in the Threat Visualizer
        version of Advanced Search and look at the URL - it will appear as a string of random characters. Copy the string
        of random characters found after the # in the URL. From the Threat Visualizer homepage, select Utilities from the
        main menu and then Base64 Converter. Paste the string into the pop-up and click ‘Decode’ - you can now see what an
        Advanced Search query is composed of. For example, making a query in the Threat Visualizer Advanced Search for @type:"ssl"
        AND @fields.dest_port:"443" over the last 15 minutes will produce the URL: https://[instance]/advancedsearch/ #eyJzZWFyY2giOiIgQHR5cGU6XCJzc2xcIiBBTkQgQGZpZWxkcy5kZXN0X3BvcnQ6XCI0NDNcIiIsImZpZWxkcyI6W10sI
        m9mZnNldCI6MCwidGltZWZyYW1lIjoiOTAwIiwiZ3JhcGhtb2RlIjoiY291bnQiLCJ0aW1lIjp7InVzZXJfaW50ZXJ2YWw iOjB9LCJtb2RlIjoiIiwiYW5hbHl6ZV9maWVsZCI6IiJ9
        Pasting the part after the # into the Base64 converter and clicking ‘Decode’ will produce: {"search":" @type:\"ssl\"
        AND @fields.dest_port:\"443\"","fields":[],"offset": 0,"timeframe":"900","graphmode":"count","time":{"user_interval":
        0},"mode":"","analyze_field":""} This is the basic structure of an Advanced Search query. Some of the parameters included
        in this request are not necessary when accessing Advanced Search programmatically. Please see the notes section for
        more details.'
      operationId: post_advancedsearch_api_search
      tags:
      - Advanced Search
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                starttime:
                  type: string
                endtime:
                  type: string
                from:
                  type: string
                to:
                  type: string
                interval:
                  type: string
                search:
                  type: string
      responses:
