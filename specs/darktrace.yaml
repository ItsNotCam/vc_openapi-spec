          type: string
        description: The time that the investigation should focus around. Valid for POST requests only.
      - name: did
        in: query
        required: false
        schema:
          type: integer
        description: The device that an investigation should be created for. Valid for POST requests only.
      - name: endtime
        in: query
        required: false
        schema:
          type: integer
        description: End time of data to return in millisecond format, relative to midnight January 1st 1970 UTC.
      - name: starttime
        in: query
        required: false
        schema:
          type: integer
        description: Start time of data to return in millisecond format, relative to midnight January 1st 1970 UTC.
      - name: investigationId
