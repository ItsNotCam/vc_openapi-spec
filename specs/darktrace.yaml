          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  took:
                    type: string
                  timed_out:
                    type: string
                  _shards:
                    type: string
                  hits:
                    type: string
                  darktraceChildError:
                    type: string
                  kibana:
                    type: string
