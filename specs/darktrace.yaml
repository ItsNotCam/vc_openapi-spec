      summary: GET /enums
      description: The /enums endpoint returns the corresponding string values for numeric codes (enumerated types) used in
        many API responses. As enums are derived for use in models, the selection of enums and enum categories that return
        will be dependent on your environment and the modules and integrations deployed. The list of enums can be filtered
        using the responsedata parameter. Using extensions is no longer supported.
