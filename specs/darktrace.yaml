openapi: 3.0.0
info:
  title: darktrace API
  description: Reconstructed from ChromaDB ingested data for darktrace.
  version: 1.0.0
paths:
  /devicesummary:
    get:
      summary: GET /devicesummary
      description: 'The /devicesummary endpoint returns contextual information for a device, aggregated from /devices , /similardevices
        , /modelbreaches , /deviceinfo and /details . When a did is specified, the endpoint returns the information displayed
        in the UI “Device Summary” window. Information from /devices is at the time of query; other endpoints cover a 28 day
        period.


        Notes:

        - Depending on the device type or whether any relevant model breaches have occurred, some endpoints may not return
        any data. In this case, the object will return empty.'
      operationId: get_devicesummary
      tags:
      - Devices
      parameters:
      - name: did
        in: query
        required: false
        schema:
          type: integer
        description: Identification number of a device modelled in the Darktrace system. Required.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: string
  /devices:
    get:
      summary: GET /devices
      description: The /devices endpoint returns a list of devices identified by Darktrace or details of a specific device
        given a time window. When a did is specified, the endpoint returns the information displayed in the UI pop-up when
        hovering over a device. Changes to a device can be made with a POST request. The fields that can be changed are the
        device type (in enum format), the priority and the label. POST requests to this endpoint can be made in JSON or parameter
        format. Fields which are not supported will be ignored when included in POST requests. Device objects can therefore
        be retrieved, modified and resubmitted to this endpoint to make changes. For targeted searches, the /devicesearch
        endpoint is recommended.
      operationId: get_devices
      tags:
      - Devices
      parameters:
      - name: did
        in: query
        required: false
        schema:
          type: integer
        description: Identification number of a device modelled in the Darktrace system.
      - name: ip
        in: query
        required: false
        schema:
          type: string
        description: IP of the device modelled in the Darktrace system.
      - name: iptime
        in: query
        required: false
        schema:
          type: string
        description: Returns the device which had the IP at a given time.
      - name: mac
        in: query
        required: false
        schema:
          type: string
        description: Returns the device with this MAC address.
      - name: seensince
        in: query
        required: false
        schema:
          type: string
        description: Relative offset for activity. Devices with activity in the specified time period are returned. The format
          is either a number representing a number of seconds before the current time, or a number with a modifier such as
          second, minute, hour day or week (Minimum=1 second).
      - name: sid
        in: query
        required: false
        schema:
          type: integer
        description: Identification number of a subnet modelled in the Darktrace system.
      - name: count
        in: query
        required: false
        schema:
          type: integer
        description: The number of devices to return. Only limits the number of devices within the current timeframe.
      - name: includetags
        in: query
        required: false
        schema:
          type: boolean
        description: Whether to include tags applied to the device in the response.
      - name: label
        in: query
        required: false
        schema:
          type: string
        description: An optional label to add to the device. Available for POST requests only.
      - name: priority
        in: query
        required: false
        schema:
          type: number
        description: The device priority on a scale of -5 to 5 - priority affects the model breach score for the device and
          can be used to filter alert outputs. Available for POST requests only.
      - name: type
        in: query
        required: false
        schema:
          type: number
        description: The device type in enum format (see /enums?responsedata=sourcedevicetypes ). Only device types which
          do not have hidden=true are available to set. Industrial device types are not available outside the Darktrace/OT
          environment. Available for POST requests only.
      - name: responsedata
        in: query
        required: false
        schema:
          type: string
        description: When given the name of a top-level field or object, restricts the returned JSON to only that field or
          object.
      - name: cloudsecurity
        in: query
        required: false
        schema:
          type: boolean
        description: When true, limits the devices returned to those identified by Darktrace Cloud Security.
      - name: saasfilter
        in: query
        required: false
        schema:
          type: string
        description: Can be used to limit returned devices to specific Darktrace/Apps, Cloud or Zero Trust module users. Can
          be repeated multiple times.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  macaddress:
                    type: string
                  vendor:
                    type: string
                  ip:
                    type: string
                  ips:
                    type: string
                  did:
                    type: string
    post:
      summary: POST /devices
      description: The /devices endpoint returns a list of devices identified by Darktrace or details of a specific device
        given a time window. When a did is specified, the endpoint returns the information displayed in the UI pop-up when
        hovering over a device. Changes to a device can be made with a POST request. The fields that can be changed are the
        device type (in enum format), the priority and the label. POST requests to this endpoint can be made in JSON or parameter
        format. Fields which are not supported will be ignored when included in POST requests. Device objects can therefore
        be retrieved, modified and resubmitted to this endpoint to make changes. For targeted searches, the /devicesearch
        endpoint is recommended.
      operationId: post_devices
      tags:
      - Devices
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                did:
                  type: string
                ip:
                  type: string
                iptime:
                  type: string
                mac:
                  type: string
                seensince:
                  type: string
                sid:
                  type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  macaddress:
                    type: string
                  vendor:
                    type: string
                  ip:
                    type: string
                  ips:
                    type: string
                  did:
                    type: string
  /status:
    get:
      summary: GET /status
      description: Detailed system health information from the Status page can be accessed programmatically with the /status
        API endpoint. This endpoint is ideal for monitoring in a NOC environment. The format=json parameter is only required
        when accessing the endpoint in a browser; an authenticated API request will return JSON as standard.
      operationId: get_status
      tags:
      - System Status
      parameters:
      - name: includechildren
        in: query
        required: false
        schema:
          type: boolean
        description: Determine whether information about probes is returned or not. True by default.
      - name: fast
        in: query
        required: false
        schema:
          type: boolean
        description: When true, JSON will be returned faster but subnet connectivity information will not be included (if
          not cached).
      - name: responsedata
        in: query
        required: false
        schema:
          type: string
        description: When given the name of a top-level field or object, restricts the returned JSON to only that field or
          object.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  excessTraffic:
                    type: string
                  time:
                    type: string
                  installed:
                    type: string
                  mobileAppConfigured:
                    type: string
                  version:
                    type: string
                  ipAddress:
                    type: string
  /modelbreaches:
    get:
      summary: GET /modelbreaches
      description: The /modelbreaches endpoint returns a time-sorted list of model breaches, filtered by the specified parameters.
        This endpoint is the most important for organizations who wish to integrate Darktrace programmatically into their
        SOC environment. The following recommendations represent a good starting point when initially approaching the query
        parameters. These parameters may change over time in response to your business logic and concerns of each security
        team. Organizations with a defined playbook may start with a different set of parameters - the API call can always
        be refined at a later date. • Busy network environments with many devices may produce a large volume of alerts over
        a short space of time. It is recommended, therefore, that queries are made at more frequent intervals and cover a
        shorter duration of time. A shorter query time frame will always return a response faster. • Organizations that want
        more data returned for use in their external system can use the minimal=false and fulldevicedetails=true parameters.
        Setting these parameters will return full model component and device information in the JSON response, allowing for
        more investigation to be carried within the SOC environment. • Acknowledged breaches can be optionally returned by
        this endpoint - this can be useful for logging resolved events to an external server or reporting on historic acknowledgment.
        Depending on your organizational approach and workflow, you may prefer to export all breaches to an external system
        - including acknowledged breaches - and make the decision there on whether the breach needs to be investigated or
        discussed further. This will, however, produce a large number of alerts so should be reviewed on a regular basis.
        • Like the Email Alerting and the Mobile App, alert score can be used as a threshold to return model breaches. Using
        minscore will only return breaches above the specified fractional amount (e.g., 0.8 is a breach score of 80%). This
        parameter can be used to mimic the “Minimum Breach Score” on the System Config page to match other alerting formats
        if desired.
      operationId: get_modelbreaches
      tags:
      - Models and Breaches
      parameters:
      - name: deviceattop
        in: query
        required: false
        schema:
          type: boolean
        description: Return the device JSON object as a value of the top-level object rather than within each matched component.
          Defaults to true in the Threat Visualizer UI and in JSON alert formats and false for the programmatic API. requests.
      - name: did
        in: query
        required: false
        schema:
          type: integer
        description: Identification number of a device modelled in the Darktrace system.
      - name: endtime
        in: query
        required: false
        schema:
          type: integer
        description: End time of data to return in millisecond format, relative to midnight January 1st 1970 UTC.
      - name: expandenums
        in: query
        required: false
        schema:
          type: boolean
        description: Expand numeric enumerated types to their descriptive string representation.
      - name: from
        in: query
        required: false
        schema:
          type: string
        description: Start time of data to return in YYYY-MM-DD HH:MM:SS format.
      - name: historicmodelonly
        in: query
        required: false
        schema:
          type: boolean
        description: Return the JSON for the historic version of the model details only, rather than both the historic and
          current definition.
      - name: includeacknowledged
        in: query
        required: false
        schema:
          type: boolean
        description: Include acknowledged breaches in the data.
      - name: includebreachurl
        in: query
        required: false
        schema:
          type: boolean
        description: Return a URL for the model breach in the long form of the model breach data, this requires that the FQDN
          configuration parameter is set.
      - name: minimal
        in: query
        required: false
        schema:
          type: boolean
        description: Reduce the amount of data returned for the API call. In the Threat Visualizer, this parameter defaults
          to false when any of the starttime , from , pid , uuid , pbid or did parameters are used. When accessed programmatically,
          always defaults to false. PARAMETER TYPE DESCRIPTION
      - name: minscore
        in: query
        required: false
        schema:
          type: integer
        description: Return only breaches with a minimum score.
      - name: pbid
        in: query
        required: false
        schema:
          type: integer
        description: Only return the model breach with the specified ID.
      - name: pid
        in: query
        required: false
        schema:
          type: number
        description: Only return model breaches for the specified model.
      - name: starttime
        in: query
        required: false
        schema:
          type: integer
        description: Start time of data to return in millisecond format, relative to midnight January 1st 1970 UTC.
      - name: to
        in: query
        required: false
        schema:
          type: string
        description: End time of data to return in YYYY-MM-DD HH:MM:SS format
      - name: uuid
        in: query
        required: false
        schema:
          type: string
        description: Only return model breaches for the specified model. All models have a uuid and a pid. The uuid (universally
          unique identifier) is a 128-bit hexadecimal number.
      - name: responsedata
        in: query
        required: false
        schema:
          type: string
        description: When given the name of a top-level field or object, restricts the returned JSON to only that field or
          object.
      - name: saasonly
        in: query
        required: false
        schema:
          type: boolean
        description: Restricts returned breaches to only those classified as SaaS breaches.
      - name: group
        in: query
        required: false
        schema:
          type: string
        description: If group=device is used, modifies the score field to display the device score.
      - name: includesuppressed
        in: query
        required: false
        schema:
          type: boolean
        description: Includes suppressed model breaches in the response. Default false .
      - name: saasfilter
        in: query
        required: false
        schema:
          type: string
        description: Can be used to limit returned model breaches to specific Darktrace/Apps, Cloud or Zero Trust module users.
          Can be repeated multiple times.
      - name: creationtime
        in: query
        required: false
        schema:
          type: boolean
        description: When true , alters the behavior of time parameters to filters based on model breach creation. When false
          (default), time filtering will instead limit by the timestamp of the first relevant activity to the model logic.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  creationTime:
                    type: string
                  commentCount:
                    type: string
                  pbid:
                    type: string
                  time:
                    type: string
                  model:
                    type: string
                  triggeredComponents:
                    type: string
  /summarystatistics:
    get:
      summary: GET /summarystatistics
      description: '/summarystatistics returns simple statistics on device counts, processed bandwidth and the number of active
        Darktrace RESPOND actions. It can be used for simple NOC monitoring of the instance device counts and processed bandwidth.
        Events There are four categories of events ( saas , csensor , network , loginput ) and three types ( notices , devicedetails
        , modelevents ). Categories refer to the component that produced the event, such as via syslog ingestion or from a
        Darktrace Client Sensor (cSensor). For types, notices are non-connection events such as SaaS logins, devicedetails
        are tracking events such as those that change the IP of a device (e.g. DHCP), and modelevents are events associated
        with modeling (distinct from actual model breaches). Categories and types can be requested independently, such as:
        /summarystatistics?eventtype=saas /summarystatistics?eventtype=devicedetails Or, combined to request a count of only
        specific events: /summarystatistics?eventtype=networkdevicedetails Please note, category saas cannot be combined with
        type devicedetails . MITRE ATT&CK Framework Darktrace Threat Visualizer 6 introduced a new iteration of the homepage
        summary which visualizes how vast quantities of raw events have been distilled by Darktrace analysis, and how these
        events are relevant to tactics under the MITRE ATT&CK framework. • For model breaches and raw events, this data is
        retrieved from the /summarystatistics endpoint with the mitreTactics parameter. • For AI Analyst, this data is returned
        in the groupStats.mitreTactics object returned from the /aianalyst/stats endpoint. For more information on the summary
        panel, please refer to Understanding the Summary Panel (Customer Portal).'
      operationId: get_summarystatistics
      tags:
      - System Status
      parameters:
      - name: responsedata
        in: query
        required: false
        schema:
          type: string
        description: When given the name of a top-level field or object, restricts the returned JSON to only that field or
          object.
      - name: eventtype
        in: query
        required: false
        schema:
          type: string
        description: Changes the format of data to return numeric event counts for any of the four categories of events and/or
          three types (see above).
      - name: endtime
        in: query
        required: false
        schema:
          type: integer
        description: End time of data to return in millisecond format, relative to midnight January 1st 1970 UTC. Requires
          eventtype .
      - name: to
        in: query
        required: false
        schema:
          type: string
        description: End time of data to return in YYYY-MM-DD HH:MM:SS format. Requires eventtype .
      - name: hours
        in: query
        required: false
        schema:
          type: number
        description: The number of hour intervals from the end time (or current time) to return. Requires eventtype .
      - name: csensor
        in: query
        required: false
        schema:
          type: boolean
        description: When true , only bandwidth statistics are returned for Darktrace/Endpoint cSensor agents. When false
          , statistics returned are for Darktrace/Network bandwidth
      - name: mitreTactics
        in: query
        required: false
        schema:
          type: boolean
        description: When true , alters the returned data to display total processed raw events and analysis outputs, broken
          down by MITRE ATT&CK Framework tactic.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  usercredentialcount:
                    type: string
                  subnets:
                    type: string
                  patterns:
                    type: string
                  bandwidth:
                    type: string
                  antigenaDevices:
                    type: string
                  antigenaActions:
                    type: string
  /details:
    get:
      summary: GET /details
      description: 'The /details endpoint returns a time-sorted list of connections and events for a device or entity (such
        as a SaaS credential). The request requires either a device ( did ), a model breach ID ( pbid ), a message field value
        ( msg ), or the blockedconnections parameter. This advanced endpoint can be used to gather detailed information about
        a specific device and its connections for investigation or monitoring purposes. It is primarily used to populate log
        elements such as device event logs, model breach event logs, metric logs and other chronological event log interfaces.
        Darktrace RESPOND/Network Actions The blockedconnections parameter is used to filter connection events to those that
        Darktrace RESPOND/Network attempted to action. Connections which triggered the creation and sending of a RESPOND RST
        will contain the antigenablocked key. At the time the action is taken, "antigenablocked": "true" is added to the connection
        entry. As this is performed at action time, Darktrace is unable to ascertain if the action was successful until the
        connection has demonstrably ended - this state therefore represents an attempt to block only. If, after the action,
        Darktrace detects that the connection continued and the action was unsuccessful, "antigenablocked": "true" is updated
        to "antigenablocked": "false" . This is only possible where Darktrace can clearly ascertain that the action was unsuccessful,
        so there may be scenarios such as very short-lived connections, where this is impossible to derive. This field value
        change is performed retrospectively; if data is requested at the time of connection, all entries where blocks where
        attempted will show "antigenablocked": "true" . A short delay is therefore recommended when ascertaining whether an
        action failed to end a connection.'
      operationId: get_details
      tags:
      - General
      parameters:
      - name: applicationprotocol
        in: query
        required: false
        schema:
          type: string
        description: This filter can be used to filter the returned data by application protocol. See /enums for the list
          of application protocols.
      - name: count
        in: query
        required: false
        schema:
          type: integer
        description: Specifies the maximum number of items to return.
      - name: ddid
        in: query
        required: false
        schema:
          type: number
        description: Identification number of a destination device modelled in the Darktrace system to restrict data to.
      - name: deduplicate
        in: query
        required: false
        schema:
          type: boolean
        description: Display only one equivalent connection per hour.
      - name: destinationport
        in: query
        required: false
        schema:
          type: number
        description: This filter can be used to filter the returned data by destination port.
      - name: did
        in: query
        required: false
        schema:
          type: integer
        description: Identification number of a device modelled in the Darktrace system.
      - name: endtime
        in: query
        required: false
        schema:
          type: integer
        description: End time of data to return in millisecond format, relative to midnight January 1st 1970 UTC.
      - name: eventtype
        in: query
        required: false
        schema:
          type: string
        description: Specifies an type of event to return details for. Possible values are connection, unusualconnection,
          newconnection, notice, devicehistory, modelbreach.
      - name: externalhostname
        in: query
        required: false
        schema:
          type: string
        description: Specifies an external hostname to return details for.
      - name: from
        in: query
        required: false
        schema:
          type: string
        description: Start time of data to return in YYYY-MM-DD HH:MM:SS format.
      - name: fulldevicedetails
        in: query
        required: false
        schema:
          type: boolean
        description: Returns the full device detail objects for all devices referenced by data in an API response. Use of
          this parameter will alter the JSON structure of the API response for certain calls.
      - name: intext
        in: query
        required: false
        schema:
          type: string
        description: This filter can be used to filter the returned data to that which interacts with external sources and
          destinations, or is restricted to internal. Valid values or internal and external.
      - name: msg
        in: query
        required: false
        schema:
          type: string
        description: PARAMETER TYPE DESCRIPTION Specifies the value of the message field in notice events to return details
          for. Typically used to specify user credential strings.
      - name: odid
        in: query
        required: false
        schema:
          type: number
        description: Other Device ID - Identification number of a device modelled in the Darktrace system to restrict data
          to. Typically used with ddid and odid to specify device pairs regardless of source/destination.
      - name: pbid
        in: query
        required: false
        schema:
          type: integer
        description: Only return the model breach with the specified ID.
      - name: port
        in: query
        required: false
        schema:
          type: integer
        description: This filter can be used to filter the returned data by source or destination port.
      - name: protocol
        in: query
        required: false
        schema:
          type: string
        description: This filter can be used to filter the returned data by IP protocol. See /enums for the list of protocols.
      - name: sourceport
        in: query
        required: false
        schema:
          type: number
        description: This filter can be used to filter the returned data by source port.
      - name: starttime
        in: query
        required: false
        schema:
          type: integer
        description: Start time of data to return in millisecond format, relative to midnight January 1st 1970 UTC.
      - name: to
        in: query
        required: false
        schema:
          type: string
        description: End time of data to return in YYYY-MM-DD HH:MM:SS format.
      - name: uid
        in: query
        required: false
        schema:
          type: string
        description: Specifies a connection UID to return.
      - name: responsedata
        in: query
        required: false
        schema:
          type: string
        description: When given the name of a top-level field or object, restricts the returned JSON to only that field or
          object.
      - name: blockedconnections
        in: query
        required: false
        schema:
          type: string
        description: Filters the results to connections Darktrace RESPOND attempted to action. Valid values are all , failed
          , true .
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  time:
                    type: string
                  timems:
                    type: string
                  action:
                    type: string
                  eventType:
                    type: string
                  uid:
                    type: string
                  status:
                    type: string
  /endpointdetails:
    get:
      summary: GET /endpointdetails
      description: /endpointdetails returns location, IP address and (optionally) device connection information for external
        IPs and hostnames. It can be used to return intel about endpoints and the devices that have been seen accessing them.
      operationId: get_endpointdetails
      tags:
      - Devices
      parameters:
      - name: additionalinfo
        in: query
        required: false
        schema:
          type: boolean
        description: Return additional information about the endpoint.
      - name: devices
        in: query
        required: false
        schema:
          type: boolean
        description: Return a list of devices which have recently connected to the endpoint.
      - name: score
        in: query
        required: false
        schema:
          type: boolean
        description: Return rarity data for this endpoint.
      - name: hostname
        in: query
        required: false
        schema:
          type: string
        description: Return data for this hostname.
      - name: ip
        in: query
        required: false
        schema:
          type: string
        description: Return data for this ip address.
      - name: responsedata
        in: query
        required: false
        schema:
          type: string
        description: When given the name of a top-level field or object, restricts the returned JSON to only that field or
          object.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ip:
                    type: string
                  firsttime:
                    type: string
                  country:
                    type: string
                  asn:
                    type: string
                  city:
                    type: string
                  region:
                    type: string
  /aianalyst/incidents:
    get:
      summary: GET /aianalyst/incidents
      description: 'The following endpoint is now considered legacy and is preserved for backwards compatibility. To request
        AI Analyst incidents from the API in Darktrace Threat Visualizer 5.2 and above, please use /aianalyst/groups and /aianalyst/incidentevents.
        The Darktrace Cyber AI Analyst investigates, analyzes and reports upon threats seen within your Darktrace environment;
        as a starting point, it reviews and investigates all Model Breaches that occur on the system. If anomalies or patterns
        of activity are identified during this analysis process, an event is created. The /aianalyst/incidents endpoint provides
        access to AI Analyst events - a group of anomalies or network activity investigated by Cyber AI Analyst that pose
        a likely cyber threat. The endpoint supports pre-5.2 incident construction. AI Analyst incidents in the Threat Visualizer
        UI are comprised of one or more events, where an event is a tab within each incident. In 5.1 and below, incidents
        were created by grouping events by the device triggering the activity or by grouping by activity itself. Incidents
        can still be constructed around devices using the pre-5.2 methodology. Cross-network events - events which were created
        by grouping similar activity - are now deprecated. For users wishing to create alerts and construct incidents from
        the events returned by the API using the pre-5.2 method, important information about how events should be grouped
        are provided by the grouping and activity IDs. Each event returned by the API contains an activityId , one or more
        groupingIds , and a groupByActivity field which may be true or false . The activityId is an identifier for the specific
        activity detected by AI Analyst, and each entry in the groupingIDs array refers to a device that triggered the activity
        detection. Where groupByActivity=true , events which are returned during the timeframe should be aggregated by the
        activityId to create cross-device incidents. Where groupByActivity=false , events which are returned during the timeframe
        should be aggregated by the groupingIds to create device-based incidents. Please note, AI Analyst incidents constructed
        using the pre-5.2 methodology are aggregations of events within a timeframe. Incidents as presented in the User Interface
        may not directly correlate with those constructed from the API due to differing time or scoring parameters.


        Notes:

        - The id field seen in the JSON response is a system field intended for use by the Threat Visualizer interface. Although
        for many event types the contents of the children field and the id field are consistent, some event types (such as
        cross-network events) utilize a pseudo-identifier in the id field which will not return data when used with the uuid
        parameter. As cross-network events are now deprecated, both values ( id or children ) can now be used. • Links back
        to the Threat Visualizer can be included in the response with includeincidenturl=true . Please see the response schema
        for a full breakdown of the details array.'
      operationId: get_aianalyst_incidents
      tags:
      - AI Analyst
      parameters:
      - name: includeacknowledged
        in: query
        required: false
        schema:
          type: boolean
        description: Include acknowledged events in the data.
      - name: endtime
        in: query
        required: false
        schema:
          type: integer
        description: End time of data to return in millisecond format, relative to midnight January 1st 1970 UTC.
      - name: starttime
        in: query
        required: false
        schema:
          type: integer
        description: Start time of data to return in millisecond format, relative to midnight January 1st 1970 UTC.
      - name: locale
        in: query
        required: false
        schema:
          type: string
        description: The language for returned strings. Currently supported are de_DE (German), en_GB (English UK), en_US
          (English US), es_ES (Spanish ES), es_419 (Spanish LATAM), fr_FR (French), it_IT (Italian), ja_JP (Japanese), ko_KR
          (Korean) , pt_BR (Portuguese BR), zh_Hans (Chinese (Simplified)), zh_Hant (Chinese (Traditional))
      - name: uuid
        in: query
        required: false
        schema:
          type: string
        description: A unique identifier for an AI Analyst event. Takes multiple values comma-separated.
      - name: did
        in: query
        required: false
        schema:
          type: integer
        description: Identification number of a device modelled in the Darktrace system.
      - name: mergeEvents
        in: query
        required: false
        schema:
          type: boolean
        description: Cross-Network events are deprecated as of 5.2. This parameter is no longer available.
      - name: includeallpinned
        in: query
        required: false
        schema:
          type: boolean
        description: True by default. Controls whether pinned events are returned alongside those from the timeframe specified.
      - name: includeincidenturl
        in: query
        required: false
        schema:
          type: boolean
        description: PARAMETER TYPE DESCRIPTION Controls whether links to events are included in the response - requires the
          FQDN value to be set and valid for the queried instance.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  aiaScore:
                    type: string
                  children:
                    type: string
                  createdAt:
                    type: string
                  category:
                    type: string
                  currentGroup:
                    type: string
                  summary:
                    type: string
  /models:
    get:
      summary: GET /models
      description: 'The /models endpoint returns a list of all models that currently exist on the Threat Visualizer, including
        custom models and de-activated models. The returned JSON does not contain full model logic - this can be sourced from
        the /components endpoint using the numerical values in the data array as cid ’s. This endpoint only supports filtering
        on the uuid parameter. To search for models by any other attribute, the full list must be returned and parsed. As
        of Darktrace Threat Visualizer 6, models now include MITRE ATT&CK Mapping information, where relevant. The mitre object
        will only appear for models which have been mapped.


        Notes:

        - The uuid value is unique and consistent for models across Darktrace environments. The pid value is unique only within
        the context of the given instance.'
      operationId: get_models
      tags:
      - Models and Breaches
      parameters:
      - name: uuid
        in: query
        required: false
        schema:
          type: string
        description: All models have a uuid and a pid. The uuid (universally unique identifier) is a 128-bit hexadecimal number.
      - name: responsedata
        in: query
        required: false
        schema:
          type: string
        description: When given the name of a top-level field or object, restricts the returned JSON to only that field or
          object.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  pid:
                    type: string
                  phid:
                    type: string
                  uuid:
                    type: string
                  logic:
                    type: string
                  throttle:
                    type: string
  /similardevices:
    get:
      summary: GET /similardevices
      description: This endpoint returns a list of similar devices when given the did of a specific device on the network.
        This information is shown in the Threat Visualizer when the ‘View Similar Devices’ button is clicked after searching
        for a device in the Omnisearch bar. The similarity between the specified device and the returned devices is indicated
        by the score . The returned data will be ordered by similarity score, with the most similar device first.
      operationId: get_similardevices
      tags:
      - General
      parameters:
      - name: count
        in: query
        required: false
        schema:
          type: integer
        description: Specifies the maximum number of items to return.
      - name: fulldevicedetails
        in: query
        required: false
        schema:
          type: boolean
        description: Returns the full device detail objects for all devices referenced by data in an API response. Use of
          this parameter will alter the JSON structure of the API response for certain calls.
      - name: token
        in: query
        required: false
        schema:
          type: string
        description: Takes a token value returned by a system notice about a change in similar devices for a specified device.
          Will return the old and new list of devices.
      - name: responsedata
        in: query
        required: false
        schema:
          type: string
        description: When given the name of a top-level field or object, restricts the returned JSON to only that field or
          object.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  did:
                    type: string
                  score:
                    type: string
                  ip:
                    type: string
                  ips:
                    type: string
                  sid:
                    type: string
                  hostname:
                    type: string
  /network:
    get:
      summary: GET /network
      description: The /network endpoint returns data about connectivity between two or more devices - it can take a device
        or subnet option - and can be used for investigative and monitoring purposes. The default metric used is “Data Transfer
        Volume”, but any metric may be specified to monitor connectivity, behavior and protocol usage. See /metrics for details
        of how to review all metrics available, and metrics (Customer Portal) for definitions of a subset of available metrics.
        The statistics object returns the information found on the right-hand side of the Threat Visualizer when a subnet
        is focused upon (Customer Portal).
      operationId: get_network
      tags:
      - Network
      parameters:
      - name: applicationprotocol
        in: query
        required: false
        schema:
          type: string
        description: This filter can be used to filter the returned data by application protocol. See /enums for the list
          of application protocols.
      - name: destinationport
        in: query
        required: false
        schema:
          type: number
        description: This filter can be used to filter the returned data by destination port.
      - name: did
        in: query
        required: false
        schema:
          type: integer
        description: Identification number of a device modelled in the Darktrace system.
      - name: endtime
        in: query
        required: false
        schema:
          type: integer
        description: End time of data to return in millisecond format, relative to midnight January 1st 1970 UTC.
      - name: from
        in: query
        required: false
        schema:
          type: string
        description: Start time of data to return in YYYY-MM-DD HH:MM:SS format.
      - name: fulldevicedetails
        in: query
        required: false
        schema:
          type: boolean
        description: Returns the full device detail objects for all devices referenced by data in an API response. Use of
          this parameter will alter the JSON structure of the API response for certain calls.
      - name: intext
        in: query
        required: false
        schema:
          type: string
        description: This filter can be used to filter the returned data to that which interacts with external sources and
          destinations, or is restricted to internal. Valid values are internal and external.
      - name: ip
        in: query
        required: false
        schema:
          type: string
        description: Return data for this IP address.
      - name: metric
        in: query
        required: false
        schema:
          type: string
        description: Name of a metric. See the /metrics endpoint for the full list of current metrics.
      - name: port
        in: query
        required: false
        schema:
          type: integer
        description: This filter can be used to filter the returned data by source or destination port.
      - name: protocol
        in: query
        required: false
        schema:
          type: string
        description: This filter can be used to filter the returned data by IP protocol. See /enums for the list of protocols.
      - name: sourceport
        in: query
        required: false
        schema:
          type: number
        description: This filter can be used to filter the returned data by source port
      - name: starttime
        in: query
        required: false
        schema:
          type: integer
        description: Start time of data to return in millisecond format, relative to midnight January 1st 1970 UTC.
      - name: to
        in: query
        required: false
        schema:
          type: string
        description: End time of data to return in YYYY-MM-DD HH:MM:SS format.
      - name: viewsubnet
        in: query
        required: false
        schema:
          type: number
        description: Takes an sid value to focus on a specific subnet.
      - name: responsedata
        in: query
        required: false
        schema:
          type: string
        description: When given the name of a top-level field or object, restricts the returned JSON to only that field or
          object.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  statistics:
                    type: string
                  subnets:
                    type: string
                  devices:
                    type: string
                  metric:
                    type: string
                  connections:
                    type: string
  /metricdata:
    get:
