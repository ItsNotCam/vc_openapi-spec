      summary: POST /modelbreaches/{pbid}/acknowledge
      description: 'The /acknowledge and /unacknowledge extensions of the /modelbreaches endpoint allow for breaches to be
        acknowledged or unacknowledged programmatically, given a pbid value. This can be very useful when integrating Darktrace
        with other SOC or ticket-management tools. The pbid must be specified as part of the extension in the format: /modelbreaches/[pbid]/acknowledge
        or /modelbreaches/[pbid]/unacknowledge . POST requests to these endpoints can be made with parameters or JSON (6.0+).'
      operationId: post_modelbreaches_pbid_acknowledge
