  /aianalyst/incidentevents:
    get:
      summary: GET /aianalyst/incidentevents
      description: 'The /aianalyst/incidentevents endpoint provides access to AI Analyst events - a group of anomalies or
        network activity investigated by Cyber AI Analyst. The Darktrace Cyber AI Analyst investigates, analyzes and reports
        upon threats seen within your Darktrace environment; as a starting point, it reviews and investigates all model breaches
        that occur on the system. If anomalies or patterns of activity are identified during this analysis process, an event
        is created. Darktrace Threat Visualizer 5.2 introduces a significant development in the way AI Analyst incidents are
        constructed. New, ‘open’ incidents are created by a meta-analysis of the devices, endpoints and activity involved
        in each event. Events with linking factors are then joined together persistently to create incidents encompassing
        a much wider scope of time and activity. AI Analyst incidents in the Threat Visualizer UI are comprised of one or
        more events, where an event is a tab within each incident. The /aianalyst/incidentevents endpoint returned detailed
        information about each of these events. Constructing Incidents from Incident Events To build incidents from incident
        events, the simplest method is to use the /aianalyst/groups endpoint to retrieve a mapping of incident events to incidents,
        then retrieving further details about those events from this endpoint ( /aianalyst/incidentevents ). Incident events
        retrieved from /aianalyst/incidentevents do still contain mapping information that allow incidents to be reconstructed:
        • The field currentGroup contains the groupid that corresponds to the overall incident. • The field groupPreviousGroups
        contains the previous groupid s of incidents the event was part of, if the incident was subsequently merged into another.
        Please refer to “Incidents within Incidents” in /aianalyst/groups for more information on merged incidents.


        Notes:

        - Where the specified locale uses non-ascii characters, these will be returned in unicode format and must be parsed.
        • The uuid of an event can be found in the id field of the JSON response. • For scoring parameters minscore and maxscore
        , note that incident scores may change (increase) over time as new events are added with more severe behavior. • The
        parameter uuid takes priority over all filters. The parameter groupid takes priority over all filters other than uuid
        . ◦ A uuid value can be found in the field id , or in the field uuid in the incidentEvents array of an incident event
        retrieved from the /aianalyst/groups endpoint. ◦ A groupid value can be found in the field currentGroup , or in the
        id field of an incident event retrieved from the /aianalyst/groups endpoint. • As of Darktrace 6.1, incident events
        may contain a sender value, indicating the event activity is sourced from Darktrace/Email. For these events, the breachDevices
        array will be returned empty. Please see the response schema for a full breakdown of the details array.'
      operationId: get_aianalyst_incidentevents
      tags:
      - AI Analyst
      parameters:
      - name: includeacknowledged
        in: query
        required: false
        schema:
          type: boolean
        description: Include acknowledged events in the data.
      - name: includeallpinned
        in: query
        required: false
        schema:
          type: boolean
        description: True by default. Controls whether pinned events are returned alongside those from the timeframe specified.
      - name: includeonlypinned
        in: query
        required: false
        schema:
          type: boolean
        description: False by default. Used to only return pinned incident events.
      - name: includeincidenteventurl
        in: query
        required: false
        schema:
          type: boolean
        description: Controls whether links to events are included in the response - requires the FQDN value to be set and
          valid for the queried instance.
      - name: locale
        in: query
        required: false
        schema:
          type: string
        description: The language for returned strings. Currently supported are de_DE (German), en_GB (English UK), en_US
          (English US), es_ES (Spanish ES), es_419 (Spanish LATAM), fr_FR (French), it_IT (Italian), ja_JP (Japanese), ko_KR
          (Korean) , pt_BR (Portuguese BR), zh_Hans (Chinese (Simplified)), zh_Hant (Chinese (Traditional))
      - name: endtime
        in: query
        required: false
        schema:
          type: integer
        description: End time of data to return in millisecond format, relative to midnight January 1st 1970 UTC.
      - name: starttime
        in: query
        required: false
        schema:
          type: integer
        description: Start time of data to return in millisecond format, relative to midnight January 1st 1970 UTC.
      - name: groupcompliance
        in: query
        required: false
        schema:
          type: boolean
        description: PARAMETER TYPE DESCRIPTION Return only events that are part of incidents which have the “compliance”
          behavior category. Multiple category parameters can be specified.
      - name: groupsuspicious
        in: query
        required: false
        schema:
          type: boolean
        description: Return only events that are part of incidents which have the “suspicious” behavior category. Multiple
          category parameters can be specified.
      - name: groupcritical
        in: query
        required: false
        schema:
          type: boolean
        description: Return only events that are part of incidents which have the “critical” behavior category. Multiple category
          parameters can be specified.
      - name: maxscore
        in: query
        required: false
        schema:
          type: integer
        description: The maximum score an event can possess and still be returned. Accepts values between 0 and 100.
      - name: minscore
        in: query
        required: false
        schema:
          type: integer
        description: The minimum score an event can possess and still be returned. Accepts values between 0 and 100.
      - name: maxgroupscore
        in: query
        required: false
        schema:
          type: integer
        description: Restrict returned events by the maximum incident score for the incident it is associated with. Accepts
          values between 0 and 100.
      - name: mingroupscore
        in: query
        required: false
        schema:
          type: integer
        description: Restrict returned events by the minimum incident score for the incident it is associated with. Accepts
          values between 0 and 100.
      - name: did
        in: query
        required: false
        schema:
          type: integer
        description: Identification number of a device modeled in the Darktrace system to include incident events for.
      - name: excludedid
        in: query
        required: false
        schema:
          type: integer
        description: Identification number of a device modeled in the Darktrace system to remove incident events for.
      - name: sid
        in: query
        required: false
        schema:
          type: integer
        description: Identification number of a subnet modeled in the Darktrace system to include incident events for.
      - name: excludesid
        in: query
        required: false
        schema:
          type: integer
        description: Identification number of a subnet modeled in the Darktrace system to remove incident events for.
      - name: master
        in: query
        required: false
        schema:
          type: integer
        description: Identification number of a master instance under a Unified View to include incident events for. Only
          relevant in Unified View environments.
      - name: saasonly
        in: query
        required: false
        schema:
          type: boolean
        description: Restricts returned events to only those that contain SaaS activity.
      - name: groupid
        in: query
        required: false
        schema:
          type: string
        description: A unique identifier of an AI Analyst incident. If specified, overrides all other filter parameters specified
          (exception uuid , which takes priority) and only returns events associated with the specified incidents.
      - name: uuid
        in: query
        required: false
        schema:
          type: string
        description: A unique identified of an AI Analyst incident event. If specified, overrides all other filter parameters
          specified and only returns the chosen events.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  summariser:
                    type: string
                  mitreTactics:
                    type: string
                  acknowledged:
                    type: string
                  pinned:
                    type: string
                  createdAt:
                    type: string
                  attackPhases:
                    type: string
  /intelfeed:
    get:
      summary: GET /intelfeed
      description: '/intelfeed is the programmatic way to access Watched Domains (Customer Portal), a list of domains, IPs
        and hostnames utilized by the Darktrace system, Darktrace Inoculation and STIX/TAXII integration to create model breaches.
        Watched domains are categorized by sources: if no source is specified in a request, the source string will be set
        to “default”. Multiple watched domains can be added and removed in one request. POST requests to these endpoints can
        be made with parameters or JSON (6.0+).'
      operationId: get_intelfeed
      tags:
      - General
      parameters:
      - name: addentry
        in: query
        required: false
        schema:
          type: string
        description: Add an external domain, hostname or IP address. Available for POST requests.
      - name: addlist
        in: query
        required: false
        schema:
          type: string
        description: Add a new line or comma separated list of external domains, hostnames and IP addresses. Available for
          POST requests.
      - name: description
        in: query
        required: false
        schema:
          type: string
        description: Provide a description for added entries. The description must be under 256 characters. Available for
          POST requests
      - name: expiry
        in: query
        required: false
        schema:
          type: string
        description: Set an expiration time for added items. Available for POST requests
      - name: hostname
        in: query
        required: false
        schema:
          type: boolean
        description: Set to true to treat the added items as hostnames rather than domains. Available for POST requests.
      - name: removeall
        in: query
        required: false
        schema:
          type: boolean
        description: Remove all external domains, hostnames and IP addresses.
      - name: removeentry
        in: query
        required: false
        schema:
          type: string
        description: Remove an external domain, hostname or IP address. A source must also be defined if multiple sources
          are in place.
      - name: source
        in: query
        required: false
        schema:
          type: string
        description: Provide a source for added entries or restrict a retrieved list of entries to a particular source. A
          source is a textual label used to manage multiple lists of entities. Sources must be under 64 characters in length.
          The source of a watched endpoint entry can be used as a filter in models. A single entry can belong to any number
          of sources. Available for POST requests.
      - name: sources
        in: query
        required: false
        schema:
          type: boolean
        description: Return the current set of sources rather than the list of watched endpoint/intelfeed entries.
      - name: fulldetails
        in: query
        required: false
        schema:
          type: boolean
        description: Return full details about expiry time and description for each entry.
      - name: iagn
        in: query
        required: false
        schema:
          type: boolean
        description: Enables automatic Darktrace RESPOND/Network (formerly Antigena Network) actions against the endpoint.
          Not applicable to IP ranges. Available for POST requests.
      responses:
        '200':
          description: Successful response
    post:
      summary: POST /intelfeed
      description: '/intelfeed is the programmatic way to access Watched Domains (Customer Portal), a list of domains, IPs
        and hostnames utilized by the Darktrace system, Darktrace Inoculation and STIX/TAXII integration to create model breaches.
        Watched domains are categorized by sources: if no source is specified in a request, the source string will be set
        to “default”. Multiple watched domains can be added and removed in one request. POST requests to these endpoints can
        be made with parameters or JSON (6.0+).'
      operationId: post_intelfeed
      tags:
      - General
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                addentry:
                  type: string
                addlist:
                  type: string
                description:
                  type: string
                expiry:
                  type: string
                hostname:
                  type: string
                removeall:
                  type: string
      responses:
        '200':
          description: Successful response
  /aianalyst/stats:
    get:
      summary: GET /aianalyst/stats
      description: 'The /stats extension of the /aianalyst endpoint returns metadata on the investigations AI Analyst has
        performed and the incidents and incident events resulting from those investigations. This data is used to populate
        the homepage summary panel (refer to Understanding the Summary Panel (Customer Portal) for more information). Darktrace
        Threat Visualizer 6 introduced a new iteration of the homepage summary which visualizes how vast quantities of raw
        events have been distilled by Darktrace analysis, and how these events are relevant to tactics under the MITRE ATT&CK
        framework. • For model breaches and raw events, this data is retrieved from the /summarystatistics endpoint with the
        mitreTactics parameter. • For AI Analyst, this data is returned in the groupStats.mitreTactics object returned from
