  /antigena:
    get:
      summary: GET /antigena
      description: 'The /antigena endpoint returns information about current and past Darktrace RESPOND/Network (formerly
        Antigena Network) actions. It can be used to retrieve a list of currently quarantined devices or Darktrace RESPOND
        Actions requiring approval. Information from active integrations such as firewalls is not included in this data. If
        a time window is not specified, the request will return all current actions with a future expiry date and all historic
        actions with an expiry date in the last 14 days. Actions which were not activated will still be returned. To create
        manual Darktrace RESPOND actions via the API, the /antigena/manual endpoint can be used (6.0+). Please see /antigena/manual
        for more information. POST Requests As of Darktrace Threat Visualizer 6.0.16, the state of a RESPOND action can be
        changed via POST requests to this endpoint. This includes activation of pending actions. This can be combined into
        a simple workflow where /antigena/summary is regularly polled for new entries in the pendingActionDevices array. These
        entries represent did values which can then be used to query the /antigena endpoint with the did parameter, using
        the includehistory parameter to identify actions for the device with the current state "action": "Created (requires
        confirmation)" . The codeid for these actions can then be used for POST requests to the /antigena endpoint with "activate":
        true and an optional duration. Changes made via the API will show the username of the user the API token is associated
        with in the action history. Requests must be made in JSON format. There are four main formats for these requests:
        Activate (pending action) {"codeid":123,"activate":true,"reason":"Example reason"} Actions created by models will
        have a default duration, defined by the “Darktrace RESPOND Action Duration” setting on the model. If not duration
        value is provided, the action is activated for the default time period. Extend (active action) {"codeid":123,"duration":100,"reason":"Example
        reason"} The duration value defines the length the action should cover; a POST including this value will cause the
        action duration to be changed. For example, if an action has 100 seconds remaining, a POST request with "duration":
        110 will extend the length of the action by 10 seconds. Conversely, a POST request with "duration": 10 will reduce
        the remaining time to 10 seconds, causing the action to expire 90 seconds early. This parameter should therefore be
        used carefully. Clear (active, pending or expired action) {"codeid":123,"clear":true,"reason":"Example reason"} Clearing
        an active action will also suppress the combination of Darktrace RESPOND action and model breach conditions for the
        remainder of the time the action was active for. The duration parameter does not impact the length that an action/
        condition combination is cleared for. It is also possible to clear an expired action. Doing so will remove it from
        the returned results unless includecleared is used. Reactivate (cleared or expired action) {"codeid":123,"activate":true,"duration":
        100,"reason":"Example reason"} To reactivate a cleared or expired action, a duration must be supplied.'
      operationId: get_antigena
      tags:
      - Darktrace RESPOND
      parameters:
      - name: fulldevicedetails
        in: query
        required: false
        schema:
          type: boolean
        description: Returns the full device detail objects for all devices referenced by data in an API response. Use of
          this parameter will alter the JSON structure of the API response for certain calls.
      - name: includecleared
        in: query
        required: false
        schema:
          type: boolean
        description: Returns all Darktrace RESPOND actions including those already cleared. Defaults to false.
      - name: includehistory
        in: query
        required: false
        schema:
          type: boolean
        description: Include additional history information about the action state, such as when it was created or extended.
      - name: needconfirming
        in: query
        required: false
        schema:
          type: boolean
        description: Filters returned Darktrace RESPOND actions by those that need human confirmation or do not need human
          confirmation.
      - name: endtime
        in: query
        required: false
        schema:
          type: integer
        description: End time of data to return in millisecond format, relative to midnight January 1st 1970 UTC.
      - name: from
        in: query
        required: false
        schema:
          type: string
        description: Start time of data to return in YYYY-MM-DD HH:MM:SS format.
      - name: starttime
        in: query
        required: false
        schema:
          type: integer
        description: Start time of data to return in millisecond format, relative to midnight January 1st 1970 UTC.
      - name: to
        in: query
        required: false
        schema:
          type: string
        description: End time of data to return in YYYY-MM-DD HH:MM:SS format.
      - name: includeconnections
        in: query
        required: false
        schema:
          type: boolean
        description: Adds a connections object which returns connections blocked by a Darktrace RESPOND action.
      - name: responsedata
        in: query
        required: false
        schema:
          type: string
        description: When given the name of a top-level field or object, restricts the returned JSON to only that field or
          object.
      - name: pbid
        in: query
        required: false
        schema:
          type: integer
        description: Only return the Darktrace RESPOND actions created as a result of the model breach with the specified
          ID.
      - name: codeid
        in: query
        required: false
        schema:
          type: number
        description: Unique numeric identifier of a RESPOND action. Valid for POST requests only.
      - name: activate
        in: query
        required: false
        schema:
          type: boolean
        description: 'For POST requests, if true, indicates the request should activate an action. Cannot be combined with
          "clear": true . Valid for POST requests only.'
      - name: clear
        in: query
        required: false
        schema:
          type: boolean
        description: 'For POST requests, if true, indicates the request should clear an action. Cannot be combined with "activate":
          true . Valid for POST requests only.'
      - name: reason
        in: query
        required: false
        schema:
          type: string
        description: free text field to specify the action purpose. Valid (and recommended) for POST requests only.
      - name: duration
        in: query
        required: false
        schema:
          type: integer
        description: Specify how long the state change should apply for (optional) in seconds. For extensions, should contain
          the current duration plus the amount the action should be extended for. Valid for POST requests only.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  codeid:
                    type: string
                  did:
                    type: string
                  ip:
                    type: string
                  action:
                    type: string
                  manual:
                    type: string
                  string/:
                    type: string
    post:
      summary: POST /antigena
      description: 'The /antigena endpoint returns information about current and past Darktrace RESPOND/Network (formerly
        Antigena Network) actions. It can be used to retrieve a list of currently quarantined devices or Darktrace RESPOND
        Actions requiring approval. Information from active integrations such as firewalls is not included in this data. If
        a time window is not specified, the request will return all current actions with a future expiry date and all historic
        actions with an expiry date in the last 14 days. Actions which were not activated will still be returned. To create
        manual Darktrace RESPOND actions via the API, the /antigena/manual endpoint can be used (6.0+). Please see /antigena/manual
        for more information. POST Requests As of Darktrace Threat Visualizer 6.0.16, the state of a RESPOND action can be
        changed via POST requests to this endpoint. This includes activation of pending actions. This can be combined into
        a simple workflow where /antigena/summary is regularly polled for new entries in the pendingActionDevices array. These
        entries represent did values which can then be used to query the /antigena endpoint with the did parameter, using
        the includehistory parameter to identify actions for the device with the current state "action": "Created (requires
        confirmation)" . The codeid for these actions can then be used for POST requests to the /antigena endpoint with "activate":
        true and an optional duration. Changes made via the API will show the username of the user the API token is associated
        with in the action history. Requests must be made in JSON format. There are four main formats for these requests:
        Activate (pending action) {"codeid":123,"activate":true,"reason":"Example reason"} Actions created by models will
        have a default duration, defined by the “Darktrace RESPOND Action Duration” setting on the model. If not duration
        value is provided, the action is activated for the default time period. Extend (active action) {"codeid":123,"duration":100,"reason":"Example
        reason"} The duration value defines the length the action should cover; a POST including this value will cause the
        action duration to be changed. For example, if an action has 100 seconds remaining, a POST request with "duration":
        110 will extend the length of the action by 10 seconds. Conversely, a POST request with "duration": 10 will reduce
        the remaining time to 10 seconds, causing the action to expire 90 seconds early. This parameter should therefore be
        used carefully. Clear (active, pending or expired action) {"codeid":123,"clear":true,"reason":"Example reason"} Clearing
        an active action will also suppress the combination of Darktrace RESPOND action and model breach conditions for the
        remainder of the time the action was active for. The duration parameter does not impact the length that an action/
        condition combination is cleared for. It is also possible to clear an expired action. Doing so will remove it from
        the returned results unless includecleared is used. Reactivate (cleared or expired action) {"codeid":123,"activate":true,"duration":
        100,"reason":"Example reason"} To reactivate a cleared or expired action, a duration must be supplied.'
      operationId: post_antigena
      tags:
      - Darktrace RESPOND
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                fulldevicedetails:
                  type: string
                includecleared:
                  type: string
                includehistory:
                  type: string
                needconfirming:
                  type: string
                endtime:
                  type: string
                from:
                  type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  codeid:
                    type: string
                  did:
                    type: string
                  ip:
                    type: string
                  action:
                    type: string
                  manual:
                    type: string
                  string/:
                    type: string
