    get:
      summary: GET /tags/{tid}/entities
      description: 'The /tags/entities has two forms - /tags/entities and /tags/[tid]/entities , where tid is the ID of a
        specific tag. /tags/entities can be used to list the devices for a tag, list the tags for a device, add a tag to a
        device or remove a tag from a device. This endpoint was covered in /tags/[tid]/entities . /tags/[tid]/entities/ can
        be used to list the devices for a specific tag or add that specific tag to one or more entities (device or credential).
        For POST requests, this endpoint uses different parameters ( entityType and entityValue ) and only supports JSON-
        format data. Tags can be applied to multiple entities using an array of device ids ( did ) or credential values. DELETE
        Requests Tags can also be deleted from this endpoint using the teid - tag entity ID value - that represents the tag-to-entity
        relationship. This value appears in the data returned from a GET request to this endpoint, and in the response when
        a tag is added using this endpoint. This should be formatted as a DELETE request to the URL /tags/[tid]/entities/[teid]
        . For example, for the following response from /tags/1/entities : { "teid": 12345, "tehid": 12345, "tid": 1, "entityType":
        "Device", "entityValue": "1000", "valid": true } This tag can be removed by a DELETE request to /tags/1/entities/12345'
      operationId: get_tags_tid_entities
      tags:
      - Tags
      parameters:
      - name: tid
        in: path
        required: true
        schema:
          type: integer
        description: Unique identifier of a tag.
      - name: entityType
        in: query
        required: false
        schema:
          type: string
        description: The type of entity to be tagged. Valid values are Device and Credential .
      - name: entityValue
