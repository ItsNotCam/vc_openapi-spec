          the FQDN value to be set and valid for the queried instance. Defaults to false.
      - name: compliance
        in: query
        required: false
        schema:
          type: boolean
        description: Return incidents which have the “compliance” behavior category. Multiple category parameters can be specified.
          PARAMETER TYPE DESCRIPTION
      - name: suspicious
        in: query
        required: false
        schema:
          type: boolean
        description: Return only incidents which have the “suspicious” behavior category. Multiple category parameters can
          be specified.
      - name: critical
        in: query
        required: false
        schema:
          type: boolean
        description: Return only incidents which have the “critical” behavior category. Multiple category parameters can be
          specified.
      - name: did
        in: query
        required: false
        schema:
          type: integer
        description: Identification number of a device modeled in the Darktrace system to include incidents for.
      - name: excludedid
        in: query
        required: false
        schema:
          type: integer
        description: Identification number of a device modeled in the Darktrace system to remove incidents for.
      - name: sid
        in: query
        required: false
        schema:
          type: integer
        description: Identification number of a subnet modeled in the Darktrace system to include incidents for.
      - name: master
        in: query
        required: false
        schema:
          type: integer
        description: Identification number of a master instance under a Unified View to include incidents for. Only relevant
          in Unified View environments.
      - name: excludesid
        in: query
        required: false
        schema:
          type: integer
        description: Identification number of a subnet modeled in the Darktrace system to remove incidents for.
      - name: saasonly
        in: query
        required: false
        schema:
          type: boolean
        description: Restricts returned incidents to only those that contain a minimum of one SaaS incident event.
      - name: maxscore
        in: query
        required: false
        schema:
          type: integer
        description: The maximum score an incident can possess and still be returned. Replicates the slider filter on the
          Threat Tray. Accepts values between 0 and 100.
      - name: minscore
        in: query
        required: false
        schema:
          type: integer
