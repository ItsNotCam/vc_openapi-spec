  /aianalyst/groups:
    get:
      summary: GET /aianalyst/groups
      description: 'The Darktrace Cyber AI Analyst investigates, analyzes and reports upon threats seen within your Darktrace
        environment; as a starting point, it reviews and investigates all model breaches that occur on the system. If anomalies
        or patterns of activity are identified during this analysis process, an event is created. Darktrace Threat Visualizer
        5.2 introduces a significant development in the way AI Analyst incidents are constructed. New, ‘open’ incidents are
        created by a meta-analysis of the devices, endpoints and activity involved in each event. Events with linking factors
        are then joined together persistently to create incidents encompassing a much wider scope of time and activity. AI
        Analyst incidents in the Threat Visualizer UI are comprised of one or more events, where an event is a tab within
        each incident. The /aianalyst/groups endpoint returns incidents as groups and lists the events that comprise those
        groups. It is useful for understanding the current active incidents in the environment and how data retrieved from
        the /aianalyst/incidentevents endpoint fits together. Incidents within Incidents Over time, incidents can become merged
        with one another. This happens when two sets of disparate activity are suddenly linked by shared factors. In a simple
        example, a credential (user1) is seen in event A under incident 1. Incident 2 has an event (event B) for port scanning
        and is separate. Both incident 1 and incident 2 are returned as separate entries from the /aianalyst/groups endpoint.
        The device performing port scanning in incident 2 then performs unusual administrative connections and an event is
        created (event C). Around the time of those connections, the same credential (user1) is seen in use on the device
        and is included in the event. This event links both incident 1 and incident 2 together, and incident 2 is merged into
        incident 1. Now, the /aianalyst/groups endpoint returns one incident - incident 1 - with events A, B and C. The id
        of incident 2 can now be found in the previousIds field to indicate it was merged into incident 1.


        Notes:

        - Where the specified locale uses non-ascii characters, these will be returned in unicode format and must be parsed.
        • For scoring parameters minscore and maxscore , note that incident scores may change (increase) over time as new
        events are added with more severe behavior. • The parameter groupid takes priority over all filters. The parameter
        uuid takes priority over all filters other than groupid . ◦ A groupid value can be found in the field id , or in the
        currentGroup field of an incident event retrieved from the /aianalyst/incidentevents endpoint. ◦ A uuid value can
        be found in the field uuid in the incidentEvents array, or in the id field of an incident event retrieved from the
        /aianalyst/incidentevents endpoint. • As of Darktrace 6.1, incident events in the incidentEvents array may contain
        a sender value instead of a triggerDid , where the event activity is sourced from Darktrace/Email.'
      operationId: get_aianalyst_groups
      tags:
      - AI Analyst
      parameters:
      - name: includeacknowledged
        in: query
        required: false
        schema:
          type: boolean
        description: Include acknowledged incidents in the data. False by default.
      - name: includeallpinned
        in: query
        required: false
        schema:
          type: boolean
        description: True by default. Controls whether pinned incidents are returned alongside those from the timeframe specified.
      - name: includeonlypinned
        in: query
        required: false
        schema:
          type: boolean
        description: False by default. Used to only return pinned incidents.
      - name: endtime
        in: query
        required: false
        schema:
          type: integer
        description: End time of data to return in millisecond format, relative to midnight January 1st 1970 UTC.
      - name: starttime
        in: query
        required: false
        schema:
          type: integer
        description: Start time of data to return in millisecond format, relative to midnight January 1st 1970 UTC.
      - name: locale
        in: query
        required: false
        schema:
          type: string
        description: The language for returned strings. Currently supported are de_DE (German), en_GB (English UK), en_US
          (English US), es_ES (Spanish ES), es_419 (Spanish LATAM), fr_FR (French), it_IT (Italian), ja_JP (Japanese), ko_KR
          (Korean) , pt_BR (Portuguese BR), zh_Hans (Chinese (Simplified)), zh_Hant (Chinese (Traditional))
      - name: includegroupurl
        in: query
        required: false
