        in: path
        required: true
        schema:
          type: integer
        description: Unique identifier of a model breach.
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                acknowledge:
                  type: string
                unacknowledge:
                  type: string
      responses:
        '200':
          description: Successful response
  /modelbreaches/{pbid}/unacknowledge:
