  /aianalyst/investigations:
    post:
      summary: POST /aianalyst/investigations
      description: 'The /aianalyst/investigations endpoint returns manual AI Analyst investigations launched by users from
        the Threat Visualizer (Customer Portal), Mobile App (Customer Portal), or via the API. It can also be used to create
        new manual investigations. Darktrace AI Analyst already investigates all relevant, non-custom model breach alerts
        observed on the platform. The creation of manual investigations should therefore be limited to cases where a custom
        model has been defined, of where a third-party alert is raised for a device outside Darktrace that warrants further
        investigation in the platform. It is highly recommended to keep the number of triggered investigations within reasonable
        bounds to prevent overloading the AI Analyst and preventing legitimate investigations from occurring. Manual investigations
        can also be triggered via syslog input - please see AI Analyst Triggered Investigations (Customer Portal) for more
        information. There are three states for investigations: pending , processing and finished . A pending investigation
        waiting for AI Analyst to start the analysis. A processing investigation means analysis is underway and a finished
        investigation means the investigation has concluded. Whether the investigation identified activity of concern is indicated
        by the presence of the incidentId key and a non- empty incidents array for the investigation. AI Analyst incident
        events created by manual AI Analyst investigations may create new AI Analyst incidents, or be added to existing incidents
        if found to link to existing detected activity. POST requests to these endpoints must be made with JSON.'
      operationId: post_aianalyst_investigations
      tags:
      - AI Analyst
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                investigateTime:
                  type: string
                did:
                  type: string
                endtime:
                  type: string
                starttime:
                  type: string
                investigationId:
                  type: string
                responseData:
                  type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  investigationId:
                    type: string
                  time:
                    type: string
                  investigationTime:
                    type: string
                  did:
                    type: string
                  version:
                    type: string
                  status:
                    type: string
    get:
      summary: GET /aianalyst/investigations
      description: 'The /aianalyst/investigations endpoint returns manual AI Analyst investigations launched by users from
        the Threat Visualizer (Customer Portal), Mobile App (Customer Portal), or via the API. It can also be used to create
        new manual investigations. Darktrace AI Analyst already investigates all relevant, non-custom model breach alerts
        observed on the platform. The creation of manual investigations should therefore be limited to cases where a custom
        model has been defined, of where a third-party alert is raised for a device outside Darktrace that warrants further
        investigation in the platform. It is highly recommended to keep the number of triggered investigations within reasonable
        bounds to prevent overloading the AI Analyst and preventing legitimate investigations from occurring. Manual investigations
        can also be triggered via syslog input - please see AI Analyst Triggered Investigations (Customer Portal) for more
        information. There are three states for investigations: pending , processing and finished . A pending investigation
        waiting for AI Analyst to start the analysis. A processing investigation means analysis is underway and a finished
        investigation means the investigation has concluded. Whether the investigation identified activity of concern is indicated
        by the presence of the incidentId key and a non- empty incidents array for the investigation. AI Analyst incident
        events created by manual AI Analyst investigations may create new AI Analyst incidents, or be added to existing incidents
        if found to link to existing detected activity. POST requests to these endpoints must be made with JSON.'
      operationId: get_aianalyst_investigations
      tags:
      - AI Analyst
