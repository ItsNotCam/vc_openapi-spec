  /deviceinfo:
    get:
      summary: GET /deviceinfo
      description: The /deviceinfo endpoint returns the data used in the “Connections Data” view for a specific device that
        can be accessed from the Threat Visualizer omnisearch. The data returned covers a 4 week period.
      operationId: get_deviceinfo
      tags:
      - Devices
      parameters:
      - name: datatype
        in: query
        required: false
        schema:
          type: string
        description: Return data for either connections ( co ), data size out ( sizeout ) or data size in ( sizein ).
      - name: did
        in: query
        required: false
        schema:
          type: integer
        description: Identification number of a device.
      - name: externaldomain
        in: query
        required: false
        schema:
          type: string
        description: Restrict external data to a particular domain name
      - name: fulldevicedetails
        in: query
        required: false
        schema:
          type: boolean
        description: Returns the full device detail objects for all devices referenced by data in an API response. Use of
          this parameter will alter the JSON structure of the API response for certain calls.
      - name: odid
        in: query
        required: false
        schema:
          type: number
        description: Identification number of a destination device modelled in the Darktrace system to restrict data to.
      - name: showallgraphdata
        in: query
        required: false
        schema:
          type: boolean
        description: Return an entry for all time intervals in the graph data, including zero counts.
      - name: similardevices
        in: query
        required: false
        schema:
          type: number
        description: Return data for the primary device and this number of similar devices.
      - name: port
        in: query
        required: false
        schema:
          type: integer
        description: Restricts returned connection data to the port specified.
      - name: intervalhours
        in: query
        required: false
        schema:
          type: number
        description: The size in hours that the returned time series data is grouped by.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  deviceInfo:
                    type: string
  /cves:
    get:
      summary: GET /cves
      description: 'Please note, this endpoint is only available for Darktrace/OT environments. The /cves endpoint can be
        used to retrieve information on device CVEs created by the Darktrace/OT ICS Vulnerability Tracker integration programmatically.


        Notes:

        - fulldevicedetails=true will add a devices object with full details of the devices referenced in the results array.'
      operationId: get_cves
      tags:
      - General
      parameters:
      - name: did
        in: query
        required: false
        schema:
          type: integer
        description: Identification number of a device modelled in the Darktrace system.
      - name: fulldevicedetails
        in: query
        required: false
        schema:
          type: boolean
        description: Returns the full device detail objects for all devices referenced by data in an API response. Use of
          this parameter will alter the JSON structure of the API response for certain calls.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: string
  /modelbreaches/{pbid}/comments:
    get:
      summary: GET /modelbreaches/{pbid}/comments
      description: 'The /comments extension of the /modelbreaches endpoint returns current comments on a model breach and
        allows for new comments to be posted, given a pbid value. The pbid must be specified as part of the extension in the
        format: /modelbreaches/[pbid]/comments . POST requests to this endpoint must be made in JSON format.'
      operationId: get_modelbreaches_pbid_comments
      tags:
      - Models and Breaches
      parameters:
      - name: pbid
        in: path
        required: true
        schema:
          type: integer
        description: Unique identifier of a model breach.
      - name: responsedata
        in: query
        required: false
        schema:
          type: string
        description: When given the name of a top-level field or object, restricts the returned JSON to only that field or
          object. Available for GET requests only.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  username:
                    type: string
                  time:
                    type: string
                  pid:
                    type: string
    post:
      summary: POST /modelbreaches/{pbid}/comments
      description: 'The /comments extension of the /modelbreaches endpoint returns current comments on a model breach and
        allows for new comments to be posted, given a pbid value. The pbid must be specified as part of the extension in the
        format: /modelbreaches/[pbid]/comments . POST requests to this endpoint must be made in JSON format.'
      operationId: post_modelbreaches_pbid_comments
      tags:
      - Models and Breaches
      parameters:
      - name: pbid
        in: path
        required: true
        schema:
          type: integer
        description: Unique identifier of a model breach.
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                responsedata:
                  type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  username:
                    type: string
                  time:
                    type: string
                  pid:
                    type: string
  /mbcomments:
    get:
      summary: GET /mbcomments
      description: 'The /mbcomments endpoint returns all comments across model breaches, or for a specific model breach.


        Notes:

        - If not supplied, count will default to 100.'
      operationId: get_mbcomments
      tags:
      - General
      parameters:
      - name: endtime
        in: query
        required: false
        schema:
          type: integer
        description: End time of data to return in millisecond format, relative to midnight January 1st 1970 UTC.
      - name: starttime
        in: query
        required: false
        schema:
          type: integer
        description: Start time of data to return in millisecond format, relative to midnight January 1st 1970 UTC.
      - name: responsedata
        in: query
        required: false
        schema:
          type: string
        description: When given the name of a top-level field or object, restricts the returned JSON to only that field or
          object.
      - name: count
        in: query
        required: false
        schema:
          type: integer
        description: The number of comments to return. Only limits the number of comments within the specified timeframe.
      - name: pbid
        in: query
        required: false
        schema:
          type: integer
        description: Only return comments for the model breach with the specified ID.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  time:
                    type: string
                  pbid:
                    type: string
                  username:
                    type: string
                  message:
                    type: string
                  pid:
                    type: string
                  name:
                    type: string
  /subnets:
    get:
      summary: GET /subnets
      description: The /subnets endpoint allows subnets processed by Darktrace to be retrieved and edited programmatically.
        This can be useful when automating changes to large number of subnets or managing the quality of traffic across the
        network. POST requests to this endpoint can be made with parameters or JSON (6.0+). The /editsubnet endpoint for modifying
        subnets has now been deprecated.
      operationId: get_subnets
      tags:
      - Network
      parameters:
      - name: seensince
        in: query
        required: false
        schema:
          type: string
        description: Relative offset for activity. Subnets with activity in the specified time period are returned. The format
          is either a number representing a number of seconds before the current time, or a number with a modifier such as
          day or week (Minimum=1 second, Maximum=6 months).
      - name: sid
        in: query
        required: false
        schema:
          type: integer
        description: Identification number of a subnet modeled in the Darktrace system.
      - name: label
        in: query
        required: false
        schema:
          type: string
        description: An optional label to identify the subnet by. Available for POST requests only.
      - name: network
        in: query
        required: false
        schema:
          type: string
        description: The IP address range that describes the subnet. Available for POST requests only.
      - name: longitude
        in: query
        required: false
        schema:
          type: number
        description: For the actual location of the subnet as rendered on the Threat Visualizer, the longitude value. Available
          for POST requests only.
      - name: latitude
        in: query
        required: false
        schema:
          type: number
        description: For the actual location of the subnet as rendered on the Threat Visualizer, the latitude value. Available
          for POST requests only.
      - name: dhcp
        in: query
        required: false
        schema:
          type: boolean
        description: Whether DHCP is enabled for the subnet. Available for POST requests only.
      - name: uniqueUsernames
        in: query
        required: false
        schema:
          type: boolean
        description: Whether the subnet is tracking by credential. Available for POST requests only.
      - name: uniqueHostnames
        in: query
        required: false
        schema:
          type: boolean
        description: Whether the subnet is tracking by hostname. Available for POST requests only.
      - name: excluded
        in: query
        required: false
        schema:
          type: boolean
        description: Whether traffic in this subnet should not be processed at all. Available for POST requests only.
      - name: modelExcluded
        in: query
        required: false
        schema:
          type: boolean
        description: Whether devices within this subnet should be fully modeled. If true, the devices will be added to the
          Internal Traffic subnet. Available for POST requests only.
      - name: responsedata
        in: query
        required: false
        schema:
          type: string
        description: When given the name of a top-level field or object, restricts the returned JSON to only that field or
          object.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  sid:
                    type: string
                  auto:
                    type: string
                  dhcp:
                    type: string
                  firstSeen:
                    type: string
                  label:
                    type: string
                  lastSeen:
                    type: string
    post:
      summary: POST /subnets
      description: The /subnets endpoint allows subnets processed by Darktrace to be retrieved and edited programmatically.
        This can be useful when automating changes to large number of subnets or managing the quality of traffic across the
        network. POST requests to this endpoint can be made with parameters or JSON (6.0+). The /editsubnet endpoint for modifying
        subnets has now been deprecated.
      operationId: post_subnets
      tags:
      - Network
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                seensince:
                  type: string
                sid:
                  type: string
                label:
                  type: string
                network:
                  type: string
                longitude:
                  type: string
                latitude:
                  type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  sid:
                    type: string
                  auto:
                    type: string
                  dhcp:
                    type: string
                  firstSeen:
                    type: string
                  label:
                    type: string
                  lastSeen:
                    type: string
  /devicesearch:
    get:
      summary: GET /devicesearch
      description: The /devicesearch endpoint provides a highly filterable search capacity to interrogate the list of devices
        Darktrace has seen on the network. It is more suited for inventory management and general queries than the /devices
        endpoint as it provides sorting and string searching capabilities.
      operationId: get_devicesearch
      tags:
      - Devices
      parameters:
      - name: count
        in: query
        required: false
        schema:
          type: integer
        description: The number of devices to return. If unspecified, defaults to 100. Maximum value is 300.
      - name: orderBy
        in: query
        required: false
        schema:
          type: string
        description: Orders the response by the specified filter, default value is lastSeen . Valid values are priority ,
          hostname , ip , macaddress , vendor , os , firstSeen , lastSeen , devicelabel or typelabel .
      - name: order
        in: query
        required: false
        schema:
          type: string
        description: Sets the sort order for returned devices as ascending or descending, can take asc or desc . Default is
          ascending.
      - name: query
        in: query
        required: false
        schema:
          type: string
        description: An optional string search. Can query all fields or take a specific field filter from label , tag , type
          , hostname , ip , mac , vendor and os .
      - name: offset
        in: query
        required: false
        schema:
          type: integer
        description: An offset for the results returned.
      - name: responsedata
        in: query
        required: false
        schema:
          type: string
        description: When given the name of a top-level field or object, restricts the returned JSON to only that field or
          object.
      - name: seensince
        in: query
        required: false
        schema:
          type: string
        description: Relative offset for activity. Devices with activity in the specified time period are returned. The format
          is either a number representing a number of seconds before the current time, or a number with a modifier such as
          second, minute, hour day or week (Minimum=1 second).
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalCount:
                    type: string
                  devices:
                    type: string
  /components:
    get:
      summary: GET /components
      description: Components are segments of model logic that are evaluated; the /components endpoint returns a list of all
        component parts of defined models, identified by their cid . The cid is referenced in the data attribute for model
        breaches. A component is a series of filters which an event or connection is assessed against as part of a larger
        model. The first part of the component describes the combinations of filters that must occur for the component to
        fire, where each filter is identified by a capital letter. The second part of the response describes the logic of
        each filter. Filters with an ID like “A” or “F” are referenced in the model logic, whereas filters with an ID like
        “d1” or “d4” are display filters - filters that are displayed in the UI when a breach occurs and have no impact on
        the component logic. For certain filtertypes , the returned argument is a numeric value that corresponds to an enumerated
        type. See (/enums) for a full list.
      operationId: get_components
      tags:
      - General
      parameters:
      - name: responsedata
        in: query
        required: false
        schema:
          type: string
        description: When given the name of a top-level field or object, restricts the returned JSON to only that field or
          object.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  cid:
                    type: string
                  chid:
                    type: string
                  mlid:
                    type: string
                  threshold:
                    type: string
                  interval:
                    type: string
                  logic:
                    type: string
  /modelbreaches/{pbid}/acknowledge:
