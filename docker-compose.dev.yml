services:
  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8000:8000"

  mcp-server:
    image: oven/bun:1-debian
    working_dir: /app
    command: sh -c "bun install && bun run --watch packages/mcp-server/main.ts serve --transport http --port 3000"
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      PORT: 3000
      HOST: 0.0.0.0
      NODE_ENV: development
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_MODEL: ${LLM_MODEL:-claude-haiku-4-5-20251001}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_URL: ${OLLAMA_URL:-}
      GIPHY_API_KEY: ${GIPHY_API_KEY:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mxbai-embed-large}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
    ports:
      - "3002:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - ./specs:/app/specs
    depends_on:
      - chromadb

  nextjs:
    image: oven/bun:1-debian
    working_dir: /app
    command: sh -c "bun install && cd packages/nextjs && bun run dev"
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      NODE_ENV: development
      HOSTNAME: 0.0.0.0
      WATCHPACK_POLLING: "true"
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_MODEL: ${LLM_MODEL:-claude-haiku-4-5-20251001}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_URL: ${OLLAMA_URL:-}
      GIPHY_API_KEY: ${GIPHY_API_KEY:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mxbai-embed-large}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      SPECS_DIR: /app/specs
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/nextjs/node_modules
      - /app/packages/nextjs/.next
      - ./specs:/app/specs
    depends_on:
      - chromadb

volumes:
  chroma_data:
